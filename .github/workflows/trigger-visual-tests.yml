name: Trigger Visual Tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  trigger-visual-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger visual testing repository
        env:
          VISUAL_TEST_REPO_TOKEN: ${{ secrets.VISUAL_TEST_REPO_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          test -n "$VISUAL_TEST_REPO_TOKEN"
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $VISUAL_TEST_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/guptaabhishek2265/Ai_visual_Testing/dispatches \
            -d "{\"event_type\":\"run-visual-tests\",\"client_payload\":{\"source_repository\":\"$SOURCE_REPOSITORY\",\"source_sha\":\"$SOURCE_SHA\",\"source_ref\":\"$SOURCE_REF\"}}"
